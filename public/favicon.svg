<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fundo arredondado verde-escuro -->
  <rect width="64" height="64" rx="14" fill="#0f4a2e"/>
  <!-- Letra I estilizada em dourado -->
  <text x="32" y="44" font-family="Georgia, serif" font-size="40" font-weight="900"
        text-anchor="middle" fill="#c8a84b">I</text>
  <!-- Ponto dourado superior (microscópio / célula) -->
  <circle cx="32" cy="10" r="5" fill="#e8c96a"/>
  <!-- Linha conectora -->
  <rect x="30.5" y="14" width="3" height="6" rx="1.5" fill="#c8a84b"/>
</svg>
